name: Deploy Lambda Containers (Bronze->Silver + Silver->Gold)

on:
  push:
    branches: [ "main" ]
    paths:
      - "lambda_functions/**"
      - ".github/workflows/deploy_lambdas.yml"

env:
  AWS_REGION: eu-west-3
  AWS_ACCOUNT_ID: 186237763237
  ECR_REGISTRY: 186237763237.dkr.ecr.eu-west-3.amazonaws.com

jobs:
  deploy-lambdas:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bronze-to-silver
            context: lambda_functions/bronze_to_silver
            repo: bronze-to-silver
          - name: silver-to-gold
            context: lambda_functions/silver_to_gold
            repo: silver-to-gold

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If you're using AWS keys as secrets:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repo exists
        run: |
          set -e
          aws ecr describe-repositories \
            --repository-names "${{ matrix.repo }}" \
            --region "${AWS_REGION}" >/dev/null 2>&1 \
          || aws ecr create-repository \
            --repository-name "${{ matrix.repo }}" \
            --region "${AWS_REGION}" >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (single-arch linux/arm64)
        run: |
          set -e
          IMAGE_URI="${ECR_REGISTRY}/${{ matrix.repo }}:${GITHUB_SHA}"
          IMAGE_URI_LATEST="${ECR_REGISTRY}/${{ matrix.repo }}:latest"

          echo "Building ${IMAGE_URI}"
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            --sbom=false \
            -t "${IMAGE_URI}" \
            -t "${IMAGE_URI_LATEST}" \
            --push \
            "${{ matrix.context }}"

          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV

      - name: Update Lambda to new image
        run: |
          set -e
          aws lambda update-function-code \
            --function-name "${{ matrix.name }}" \
            --image-uri "${ECR_REGISTRY}/${{ matrix.repo }}:${GITHUB_SHA}" \
            --region "${AWS_REGION}"